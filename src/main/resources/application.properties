# =========================
# PUERTO (Render / Local)
# =========================
server.port=${PORT:8080}

# =========================
# BASE DE DATOS (Railway en la nube / Local)
# =========================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =========================
# SPRING SECURITY
# =========================
spring.security.user.name=${SPRING_USER:admin}
spring.security.user.password=${SPRING_PASS:1234}